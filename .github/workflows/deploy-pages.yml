name: Deploy schedule to GitHub Pages

# Publish aie-wf-2026-schedule.html to GitHub Pages on every push to main.
on:
  push:
    branches: [main]
    paths:
      - "aie-wf-2026-schedule.html"
      - ".github/workflows/deploy-pages.yml"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Grant the GITHUB_TOKEN the permissions required for the Pages deploy (OIDC).
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish so a
# half-published site is never left behind.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site
        run: |
          mkdir -p _site
          # Serve the schedule at the site root...
          cp aie-wf-2026-schedule.html _site/index.html
          # ...and keep the original filename so direct links still resolve.
          cp aie-wf-2026-schedule.html _site/aie-wf-2026-schedule.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
